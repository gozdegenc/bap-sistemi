<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geçersiz Link — BAP Sistemi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #FFF5F5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 14px; padding: 48px 44px;
    width: 100%; max-width: 400px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; font-weight: 700; color: #C53030; margin-bottom: 10px; }
  p { font-size: 14px; color: #718096; line-height: 1.6; }
  .info { margin-top: 20px; padding: 14px; background: #EBF8FF;
    border-radius: 8px; font-size: 13px; color: #2B6CB0; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⛔</div>
  <h1>Bu link geçersiz</h1>
  <p>Link kullanılmış veya süresi dolmuş olabilir.<br>
  Giriş linkleri <strong>48 saat</strong> geçerlidir ve yalnızca <strong>bir kez</strong> kullanılabilir.</p>
  <div class="info">
    Yeni bir link almak için BAP Koordinasyon Birimi ile iletişime geçiniz.
  </div>
</div>
</body>
</html>
