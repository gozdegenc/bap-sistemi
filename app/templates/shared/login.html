<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — BAP Çıktı Sistemi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #EBF8FF; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; }
  .login-card { background: white; border-radius: 14px; padding: 40px 44px;
    width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo h1 { font-size: 20px; font-weight: 700; color: #1A365D; }
  .logo p { font-size: 13px; color: #718096; margin-top: 6px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600;
    color: #2D3748; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 14px;
    border: 1.5px solid #E2E8F0; border-radius: 8px;
    font-size: 15px; outline: none; transition: border-color .15s; }
  .form-group input:focus { border-color: #2B6CB0;
    box-shadow: 0 0 0 3px rgba(43,108,176,.1); }
  .btn { width: 100%; padding: 11px; background: #2B6CB0; color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: background .15s; }
  .btn:hover { background: #2c5282; }
  .alert { padding: 11px 14px; background: #FFF5F5; color: #C53030;
    border: 1px solid #feb2b2; border-radius: 8px; font-size: 14px;
    margin-bottom: 16px; }
  .info-box { margin-top: 20px; padding: 12px 14px; background: #EBF8FF;
    border-radius: 8px; font-size: 13px; color: #2B6CB0; line-height: 1.6; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>BAP Çıktı Yönetim Sistemi</h1>
    <p>Bilimsel Araştırma Projeleri Koordinasyon Birimi</p>
  </div>

  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="/giris">
    <div class="form-group">
      <label for="username">Kullanıcı Adı</label>
      <input type="text" id="username" name="username"
        placeholder="Kurumsal kullanıcı adınız" autofocus required>
    </div>
    <div class="form-group">
      <label for="password">Şifre</label>
      <input type="password" id="password" name="password"
        placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Giriş Yap</button>
  </form>

  <div class="info-box">
    Kurumsal kullanıcı adı ve şifrenizle giriş yapınız.<br>
    Sorun yaşarsanız BAP Koordinasyon Birimi ile iletişime geçiniz.
  </div>
</div>
</body>
</html>
