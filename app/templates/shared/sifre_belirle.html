<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şifre Belirle — BAP Sistemi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #EBF8FF; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 14px; padding: 40px 44px;
    width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .header { text-align: center; margin-bottom: 28px; }
  .header .icon { font-size: 40px; margin-bottom: 12px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #1A365D; }
  .header p { font-size: 14px; color: #718096; margin-top: 6px; line-height: 1.5; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600;
    color: #2D3748; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 14px;
    border: 1.5px solid #E2E8F0; border-radius: 8px;
    font-size: 15px; outline: none; transition: border-color .15s; }
  .form-group input:focus { border-color: #2B6CB0;
    box-shadow: 0 0 0 3px rgba(43,108,176,.1); }
  .btn { width: 100%; padding: 11px; background: #2B6CB0; color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: background .15s; }
  .btn:hover { background: #2c5282; }
  .alert { padding: 11px 14px; background: #FFF5F5; color: #C53030;
    border: 1px solid #feb2b2; border-radius: 8px; font-size: 14px;
    margin-bottom: 16px; }
  .hint { font-size: 12px; color: #718096; margin-top: 5px; }
  .strength { height: 4px; border-radius: 2px; margin-top: 6px;
    background: #E2E8F0; overflow: hidden; }
  .strength-bar { height: 100%; border-radius: 2px; transition: all .3s;
    width: 0; background: #C53030; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon">🔑</div>
    <h1>Hoş geldiniz, {{ full_name.split()[0] }}</h1>
    <p>BAP Çıktı Sistemi'ne ilk girişiniz için bir şifre belirleyin.</p>
  </div>

  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post">
    <div class="form-group">
      <label for="password">Şifreniz</label>
      <input type="password" id="password" name="password"
        placeholder="En az 8 karakter" required oninput="checkStrength(this.value)">
      <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
      <div class="hint" id="strength-label">En az 8 karakter giriniz</div>
    </div>
    <div class="form-group">
      <label for="password2">Şifre Tekrar</label>
      <input type="password" id="password2" name="password2"
        placeholder="Aynı şifreyi tekrar girin" required>
    </div>
    <button type="submit" class="btn">Şifremi Belirle ve Giriş Yap</button>
  </form>
</div>

<script>
function checkStrength(val) {
  const bar = document.getElementById('strength-bar');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (val.length >= 8) score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const pct = Math.min(score / 4 * 100, 100);
  const colors = ['#C53030', '#DD6B20', '#D69E2E', '#276749', '#2B6CB0'];
  const labels = ['', 'Zayıf', 'Orta', 'İyi', 'Güçlü'];
  bar.style.width = pct + '%';
  bar.style.background = colors[score] || '#C53030';
  label.textContent = score > 0 ? labels[Math.min(score, 4)] : 'En az 8 karakter giriniz';
}
</script>
</body>
</html>
