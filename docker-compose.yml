version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bappassword}
      POSTGRES_DB: ${DB_NAME:-bapdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
